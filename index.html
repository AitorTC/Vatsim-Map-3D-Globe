<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VATSIM Radar Pro - Globe 3D</title>
    
    <script src="//unpkg.com/globe.gl"></script>
    
    <style>
        body { margin: 0; padding: 0; background-color: #000; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: white; }
        #globeViz { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        /* Panel de Estado General */
        #panel-info {
            position: absolute; top: 15px; left: 15px;
            background: rgba(15, 20, 25, 0.9); border-left: 4px solid #00ff00;
            padding: 15px; border-radius: 5px; z-index: 10;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
        }
        
        /* NUEVO: Panel Lateral de Vuelo Detallado */
        #panel-vuelo {
            display: none; position: absolute; top: 15px; right: 15px; bottom: 15px;
            width: 320px; background: rgba(15, 20, 25, 0.95); border: 1px solid #333;
            border-radius: 8px; z-index: 10; overflow-y: auto;
            box-shadow: -5px 0 20px rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        
        .panel-header {
            background: #1a2630; padding: 15px; border-bottom: 2px solid #00ff00;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0;
        }
        
        .panel-header h2 { margin: 0; color: #00ff00; font-size: 22px; letter-spacing: 1px;}
        .btn-cerrar { background: none; border: none; color: white; font-size: 20px; cursor: pointer; }
        .btn-cerrar:hover { color: #ff3333; }
        
        .panel-seccion { padding: 15px; border-bottom: 1px solid #2a3640; }
        .panel-seccion h3 { margin: 0 0 10px 0; font-size: 14px; color: #88a0b5; text-transform: uppercase; }
        
        .dato-fila { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 14px; }
        .dato-etiqueta { color: #aaa; }
        .dato-valor { font-weight: bold; text-align: right; max-width: 65%; word-wrap: break-word; }
        
        .ruta-caja { background: #0b1116; padding: 10px; border-radius: 4px; font-family: monospace; font-size: 12px; color: #00ff00; word-wrap: break-word; line-height: 1.4; margin-top: 5px;}
        
        /* Estilo del avión en el mapa */
        .marcador-avion { display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; pointer-events: auto; }
        .icono-avion { width: 20px; height: 20px; fill: #00ff00; filter: drop-shadow(0px 0px 3px #00ff00); transition: transform 0.2s; }
        .texto-avion { font-size: 11px; font-weight: bold; color: white; text-shadow: 1px 1px 3px black, -1px -1px 3px black; margin-top: 2px; }
        
        /* Scrollbar personalizada para el panel */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #00ff00; border-radius: 3px; }
    </style>
</head>
<body>

    <div id="panel-info">
        <strong style="color:#00ff00; font-size: 16px;">VATSIM 3D Radar</strong><br><br>
        <span id="estado">Conectando...</span><br>
        <span id="stats" style="color: #aaa; font-size: 12px;"></span>
    </div>

    <div id="panel-vuelo">
        <div class="panel-header">
            <h2 id="v-callsign">VUELO</h2>
            <button class="btn-cerrar" onclick="cerrarPanel()">✖</button>
        </div>
        
        <div class="panel-seccion">
            <h3>Piloto</h3>
            <div class="dato-fila"><span class="dato-etiqueta">Nombre:</span> <span class="dato-valor" id="v-nombre"></span></div>
            <div class="dato-fila"><span class="dato-etiqueta">CID:</span> <span class="dato-valor" id="v-cid"></span></div>
        </div>

        <div class="panel-seccion">
            <h3>Telemetría Actual</h3>
            <div class="dato-fila"><span class="dato-etiqueta">Altitud:</span> <span class="dato-valor" id="v-alt">0</span></div>
            <div class="dato-fila"><span class="dato-etiqueta">Velocidad (GS):</span> <span class="dato-valor" id="v-vel">0</span></div>
            <div class="dato-fila"><span class="dato-etiqueta">Rumbo:</span> <span class="dato-valor" id="v-hdg">0</span></div>
            <div class="dato-fila"><span class="dato-etiqueta">Transpondedor:</span> <span class="dato-valor" id="v-sqk">0000</span></div>
        </div>

        <div id="seccion-fpl" style="display: none;">
            <div class="panel-seccion">
                <h3>Plan de Vuelo</h3>
                <div class="dato-fila"><span class="dato-etiqueta">Aeronave:</span> <span class="dato-valor" id="v-avion"></span></div>
                <div class="dato-fila"><span class="dato-etiqueta">Reglas:</span> <span class="dato-valor" id="v-reglas"></span></div>
                <div class="dato-fila"><span class="dato-etiqueta">Origen:</span> <span class="dato-valor" id="v-dep" style="color:#00bfff;"></span></div>
                <div class="dato-fila"><span class="dato-etiqueta">Destino:</span> <span class="dato-valor" id="v-arr" style="color:#00bfff;"></span></div>
                <div class="dato-fila"><span class="dato-etiqueta">Alternativo:</span> <span class="dato-valor" id="v-altn"></span></div>
                <div class="dato-fila"><span class="dato-etiqueta">Altitud Crucero:</span> <span class="dato-valor" id="v-crz"></span></div>
            </div>

            <div class="panel-seccion">
                <h3>Ruta</h3>
                <div class="ruta-caja" id="v-ruta"></div>
            </div>

            <div class="panel-seccion">
                <h3>Comentarios (Remarks)</h3>
                <div class="ruta-caja" id="v-rmk" style="color: #aaa;"></div>
            </div>
        </div>
        
        <div id="seccion-no-fpl" class="panel-seccion" style="text-align: center; color: #ff8800; display: none;">
            <br><i>Piloto sin plan de vuelo activo</i><br><br>
        </div>
    </div>

    <div id="globeViz"></div>

    <script>
        // Inicializar Globo 3D
        const world = Globe()
            (document.getElementById('globeViz'))
            .globeImageUrl('//unpkg.com/three-globe/example/img/earth-dark.jpg')
            .backgroundColor('#050505')
            .pointOfView({ lat: 40, lng: -5, altitude: 2 });

        const svgAvion = `<svg viewBox="0 0 24 24" class="icono-avion"><path d="M21,16V14L13,9V3.5A1.5,1.5 0 0,0 11.5,2A1.5,1.5 0 0,0 10,3.5V9L2,14V16L10,13.5V19L8,20.5V22L11.5,21L15,22V20.5L13,19V13.5L21,16Z" /></svg>`;

        let fronterasFIR = [];

        // Descargar FIRs de VATSpy
        fetch('https://raw.githubusercontent.com/vatsimnetwork/vatspy-data-project/master/Boundaries.geojson')
            .then(res => res.json())
            .then(data => { fronterasFIR = data.features; });

        // Función para cerrar el panel
        function cerrarPanel() {
            document.getElementById('panel-vuelo').style.display = 'none';
        }

        async function actualizarRadar() {
            try {
                const res = await fetch('https://data.vatsim.net/v3/vatsim-data.json');
                const datos = await res.json();

                const firsActivos = [];
                datos.controllers.forEach(c => {
                    if (c.callsign.includes('_CTR') || c.callsign.includes('_FSS')) {
                        firsActivos.push(c.callsign.split('_')[0]);
                    }
                });

                const poligonosIluminados = fronterasFIR.filter(f => firsActivos.includes(f.properties.id));

                world.polygonsData(poligonosIluminados)
                    .polygonAltitude(0.002)
                    .polygonCapColor(() => 'rgba(0, 191, 255, 0.15)')
                    .polygonSideColor(() => 'rgba(0, 191, 255, 0.05)')
                    .polygonStrokeColor(() => '#00bfff')
                    .polygonLabel(d => `Sector ATC: ${d.properties.id}`);

                // DIBUJAR AVIONES Y CONFIGURAR EVENTOS DE CLIC
                world.htmlElementsData(datos.pilots)
                    .htmlElement(d => {
                        const el = document.createElement('div');
                        el.className = 'marcador-avion';
                        
                        el.innerHTML = `
                            <div style="transform: rotate(${d.heading}deg);">${svgAvion}</div>
                            <div class="texto-avion">${d.callsign}</div>
                        `;
                        
                        // AL HACER CLIC EN EL AVIÓN:
                        el.onclick = (event) => {
                            event.stopPropagation(); // Evita que el clic se pase al globo y lo cierre
                            
                            document.getElementById('panel-vuelo').style.display = 'block';
                            
                            // 1. Datos Básicos y Telemetría (Siempre existen)
                            document.getElementById('v-callsign').innerText = d.callsign;
                            document.getElementById('v-nombre').innerText = d.name;
                            document.getElementById('v-cid').innerText = d.cid;
                            
                            document.getElementById('v-alt').innerText = d.altitude + " ft";
                            document.getElementById('v-vel').innerText = d.groundspeed + " kt";
                            document.getElementById('v-hdg').innerText = d.heading + "°";
                            document.getElementById('v-sqk').innerText = d.transponder;

                            // 2. Plan de Vuelo (A veces los pilotos vuelan en VFR sin enviar plan)
                            if (d.flight_plan) {
                                document.getElementById('seccion-fpl').style.display = 'block';
                                document.getElementById('seccion-no-fpl').style.display = 'none';
                                
                                document.getElementById('v-avion').innerText = d.flight_plan.aircraft || 'N/A';
                                document.getElementById('v-reglas').innerText = d.flight_plan.flight_rules === 'I' ? 'IFR' : (d.flight_plan.flight_rules === 'V' ? 'VFR' : d.flight_plan.flight_rules);
                                document.getElementById('v-dep').innerText = d.flight_plan.departure || '???';
                                document.getElementById('v-arr').innerText = d.flight_plan.arrival || '???';
                                document.getElementById('v-altn').innerText = d.flight_plan.alternate || 'Ninguno';
                                document.getElementById('v-crz').innerText = d.flight_plan.altitude || 'N/A';
                                
                                document.getElementById('v-ruta').innerText = d.flight_plan.route || 'Ruta directa / No especificada';
                                document.getElementById('v-rmk').innerText = d.flight_plan.remarks || 'Sin comentarios';
                            } else {
                                document.getElementById('seccion-fpl').style.display = 'none';
                                document.getElementById('seccion-no-fpl').style.display = 'block';
                            }
                        };
                        return el;
                    })
                    .htmlLat('latitude')
                    .htmlLng('longitude');

                const hora = new Date().toLocaleTimeString();
                document.getElementById('estado').innerText = `Actualizado: ${hora}`;
                document.getElementById('stats').innerText = `Aviones: ${datos.pilots.length} | Sectores FIR: ${poligonosIluminados.length}`;

            } catch (error) {
                document.getElementById('estado').innerText = "Error de conexión...";
            }
        }

        setTimeout(actualizarRadar, 1500);
        setInterval(actualizarRadar, 15000);

        // Si haces clic en cualquier zona vacía del globo, se cierra el panel
        document.getElementById('globeViz').addEventListener('click', cerrarPanel);

    </script>
</body>
</html>
